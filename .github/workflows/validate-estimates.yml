name: Validate low-confidence estimates

on:
  schedule:
    # 03:00 UTC daily
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      tier:
        description: 'Confidence tier to validate'
        required: false
        default: 'low'
        type: choice
        options: [low, medium, high]

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  TRACKING_ISSUE: ${{ vars.VALIDATION_TRACKING_ISSUE }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Need full history so the auto-PR can be opened from a fresh branch
          fetch-depth: 0
          # Use a token that can push to branches & open PRs
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install httpx

      - name: Run validation
        id: validate
        run: |
          python scripts/validate_estimates.py \
            --tier "${{ inputs.tier || 'low' }}" \
            --output report.md
          {
            echo 'report<<REPORT_EOF'
            cat report.md
            echo 'REPORT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Commit updated state file
        run: |
          if [ -n "$(git status --porcelain .github/data/validation_state.json)" ]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add .github/data/validation_state.json
            git commit -m "chore: update validation state ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Post comment on tracking issue
        if: env.TRACKING_ISSUE != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue comment "$TRACKING_ISSUE" --body-file report.md

      - name: Open promotion PR (if any entries reached consensus)
        if: hashFiles('promotions.json') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="auto/promote-low-to-medium-${DATE}"
          git checkout -b "$BRANCH"
          # Apply promotions to the CSV
          python - <<'PYEOF'
          import csv, json
          with open("promotions.json") as f:
              promotions = json.load(f)
          to_promote = {(p["country"], p["postal_code"]) for p in promotions}
          rows = []
          with open("tercet_missing_codes.csv", newline="") as f:
              reader = csv.DictReader(f)
              fieldnames = reader.fieldnames
              for r in reader:
                  if (r["COUNTRY_CODE"], r["POSTAL_CODE"]) in to_promote:
                      r["CONFIDENCE"] = "medium"
                  rows.append(r)
          with open("tercet_missing_codes.csv", "w", newline="") as f:
              w = csv.DictWriter(f, fieldnames=fieldnames)
              w.writeheader()
              w.writerows(rows)
          print(f"Promoted {len(promotions)} entries.")
          PYEOF
          git add tercet_missing_codes.csv
          git commit -m "chore: promote ${DATE} validated entries low → medium"
          git push --set-upstream origin "$BRANCH"
          gh pr create \
            --title "chore: promote $(jq length promotions.json) validated entries low → medium" \
            --body "Auto-generated by the daily validation workflow. These entries had three consecutive runs where GISCO's NUTS3 lookup matched our estimate. Tracking issue: #${TRACKING_ISSUE:-?}" \
            --head "$BRANCH" \
            --base main
